<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CPP Bank Login</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
        }
        body {
            align-items: center;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            box-sizing: border-box;
            max-width: 350px;
            padding: 25px;
            text-align: center;
            width: calc(100% - 32px);
        }
        input {
            box-sizing: border-box;
            margin: 10px 0;
            padding: 10px;
            width: 100%;
        }
        button {
            background-color: #004080;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px 20px;
        }
        .message {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>CPP Bank Login</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        <div class="message">
            {{ message }}
        </div>
    </div>
</body>
</html>
